<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kiosk Master v5.2 (Interactive Bars & MS Ping)</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; }
        .control-panel { padding: 15px 20px; background: #1e1e1e; border-bottom: 2px solid #333; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 10; }
        .info-group { text-align: left; flex: 1; }
        h1 { margin: 0; font-size: 1.4rem; color: #2196F3; }
        .current-status { font-size: 0.95rem; color: #aaa; margin-top: 5px; font-family: monospace; }
        .timer-display { font-size: 2.5rem; font-weight: bold; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.2); margin: 0 20px; font-family: monospace; width: 60px; text-align: center; }
        .btn-group { display: flex; gap: 10px; align-items: center; }
        button { background: #2196F3; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; font-size: 0.9rem; cursor: pointer; font-weight: bold; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
        button:hover { filter: brightness(1.2); transform: scale(1.02); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; filter: none; }
        button.start { background: #00E676; color: #000; padding: 12px 25px; font-size: 1.1rem; }
        button.stop { background: #F44336; color: white; padding: 12px 25px; font-size: 1.1rem; }
        button.pause { background: #FF9800; color: #000; padding: 12px 20px; font-size: 1.1rem; display: none; } 
        button.save { background: #FF9800; }
        button.add { background: #4CAF50; margin-top: 10px; }
        button.delete { background: #F44336; padding: 8px; border-radius: 4px; }
        button.copy { background: #555; font-size: 0.8rem; padding: 5px 10px; }
        button.small { padding: 6px 10px; font-size: 0.85rem; }
        .list-container { flex: 1; overflow-y: auto; padding: 20px; background: #181818; }
        .route-item { display: flex; align-items: center; gap: 10px; background: #252525; padding: 10px; border-radius: 6px; margin-bottom: 8px; border: 1px solid #333; transition: all 0.2s; }
        .route-item.active { background: #1b5e20; border-color: #4caf50; box-shadow: 0 0 15px rgba(76, 175, 80, 0.4); transform: scale(1.01); }
        .route-item.dragging { opacity: 0.5; border: 2px dashed #2196F3; }
        .drag-handle { cursor: grab; color: #888; font-size: 1.2rem; padding: 0 5px; user-select: none; }
        .drag-handle:active { cursor: grabbing; }
        input { background: #121212; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 4px; font-family: monospace; }
        input:focus { outline: none; border-color: #2196F3; }
        input:disabled { opacity: 0.5; cursor: not-allowed; }
        .input-name { width: 150px; }
        .input-url { flex: 1; }
        .input-time { width: 60px; text-align: center; }
        .log-header { display: flex; justify-content: space-between; align-items: center; padding: 5px 10px; background: #222; border-top: 2px solid #333; }
        .log-header span { font-size: 0.8rem; color: #aaa; font-weight: bold; }
        .log-container { height: 25%; padding: 10px; overflow-y: auto; background: #000; display: flex; flex-direction: column; font-family: monospace; }
        .log-entry { font-size: 0.85rem; padding: 3px 0; border-bottom: 1px solid #1a1a1a; display: flex; gap:8px; align-items:center; }
        .log-time { color: #666; min-width: 110px; }
        .log-msg { color: #ccc; white-space: pre-wrap; word-break: break-word; flex: 1;}
        .log-warn { color: #FF9800; }
        .log-info { color: #00E676; }
        .log-error { color: #F44336; }
        .log-ping { color: #03A9F4; font-style: italic; }
        .log-remote { color: #E040FB; font-style: italic; } 
        .log-meta { color: #999; font-size: 0.75rem; margin-left: 8px; min-width: 130px; text-align:right; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #777; }
        .status-row { display:flex; gap:12px; align-items:center; }
        .chip { background:#222; padding:6px 10px; border-radius:12px; color:#ccc; font-size:0.85rem; border:1px solid #333; }
    </style>
</head>
<body>
    <div class="control-panel">
        <div class="info-group">
            <h1>Kiosk Master Monitor (v5.2)</h1>
            <div class="current-status" id="status-text">Aguardando Início...</div>
            <div class="status-row" style="margin-top:6px;">
                <div class="chip" id="chip-connection">Popups: 0</div>
                <div class="chip" id="chip-verbose">Logging: OFF</div>
                <div class="chip" id="chip-last">Último: --</div>
            </div>
        </div>

        <div style="display:flex; gap:8px; align-items:center;">
            <button class="save" id="btn-save" onclick="salvarRotasManualmente()">💾 Salvar Alterações</button>
            <button id="btn-toggle-logs" class="small" onclick="toggleVerbose()">🔍 Ativar Logs</button>
        </div>

        <div class="btn-group">
            <div id="display-timer" class="timer-display">--</div>
            <button id="btn-pause" class="pause" onclick="togglePauseLocal()">⏸ PAUSAR</button>
            <button id="btn-start" class="start" onclick="toggleKiosk()">▶ INICIAR KIOSK</button>
        </div>
    </div>

    <div class="list-container" id="lista-rotas"></div>
    <div style="padding: 0 20px 20px 20px; background: #181818;">
        <button class="add" id="btn-add" onclick="adicionarLinha()">+ Adicionar Novo Site</button>
    </div>

    <div class="log-header">
        <span>📋 EVENT LOGS</span>
        <div style="display:flex; gap:8px; align-items:center;">
            <button class="copy" onclick="copiarLog()">📄 Copiar Log</button>
            <button class="copy" onclick="exportarLog()">⬇ Exportar (.json)</button>
            <button class="copy" onclick="limparLogsManuais()">🧹 Limpar históricos</button>
        </div>
    </div>

    <div class="log-container" id="log-box">
        <div class="log-entry"><span class="log-time">--:--:--</span><span class="log-msg log-info">System Initialized (v5.2).</span></div>
    </div>

    <script>
        const rotasPadrao = [
            { nome: 'Wikipedia', url: 'https://pt.wikipedia.org/', tempo: 15 },
            { nome: 'Google', url: 'https://www.google.com/', tempo: 15 },
            { nome: 'Windy (Tempo)', url: 'https://www.windy.com/', tempo: 15 },
            { nome: 'Outlook', url: 'https://outlook.office.com/calendar/view/workweek', tempo: 60 }
        ];

        // --- State Variables ---
        let rotas = []; let janelaKiosk = null; let running = false; let isPaused = false;
        let tempoRestante = 0; const TARGET_NAME = 'KIOSK_TAB';
        let timerWorker = null; let verboseLogging = false; let draggedItem = null;
        let currentActiveIndex = 0;
        const LOG_KEY = 'kiosk_master_logs'; const LOG_VERBOSE_KEY = 'kiosk_master_verbose'; const ROUTES_KEY = 'kiosk_master_routes';

        // Broadcasting channel (Master side fallback)
        let bc_master = null;
        try { if ('BroadcastChannel' in window) bc_master = new BroadcastChannel('kiosk_channel'); } catch (e) { bc_master = null; }

        // --- Logger Utilities ---
        function loadLogsFromStorage() { try { const raw = localStorage.getItem(LOG_KEY); return raw ? JSON.parse(raw) : []; } catch (e) { return []; } }
        function persistLogs(arr) { try { localStorage.setItem(LOG_KEY, JSON.stringify(arr.slice(-2000))); } catch(e) {} }

        function log(msg, level='info', meta = {}) {
            // Filter non-critical logs if verbose is off
            if (!verboseLogging && (level === 'remote' || level === 'warn')) return; 

            const time = new Date().toISOString();
            const entry = { time, level, msg: String(msg), meta };
            appendLogToUI(entry);
            const arr = loadLogsFromStorage(); arr.push(entry); persistLogs(arr);
            document.getElementById('chip-last').innerText = `Last: ${new Date().toLocaleTimeString()}`;
        }

        function appendLogToUI(entry) {
            const box = document.getElementById('log-box');
            const el = document.createElement('div'); el.className = 'log-entry';
            const timeSpan = document.createElement('span'); timeSpan.className = 'log-time'; timeSpan.innerText = new Date(entry.time).toLocaleTimeString();
            const msgSpan = document.createElement('span'); msgSpan.className = 'log-msg';
            const metaSpan = document.createElement('span'); metaSpan.className = 'log-meta';
            
            if (entry.level === 'warn') msgSpan.classList.add('log-warn');
            if (entry.level === 'info') msgSpan.classList.add('log-info');
            if (entry.level === 'error') msgSpan.classList.add('log-error');
            if (entry.level === 'ping') msgSpan.classList.add('log-ping');
            if (entry.level === 'remote') msgSpan.classList.add('log-remote'); 
            
            msgSpan.innerText = entry.msg;
            metaSpan.innerText = entry.meta && entry.meta.source ? `[${entry.meta.source}]` : '';
            el.appendChild(timeSpan); el.appendChild(msgSpan); el.appendChild(metaSpan);
            box.appendChild(el); box.scrollTop = box.scrollHeight;
        }

        function copiarLog() {
            const arr = loadLogsFromStorage();
            const textToCopy = JSON.stringify(arr, null, 2);
            navigator.clipboard.writeText(textToCopy).then(() => alert("Log copied to clipboard")).catch(() => alert("Failed to copy."));
        }

        function exportarLog() {
            const arr = loadLogsFromStorage();
            const blob = new Blob([JSON.stringify(arr, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `kiosk_master_logs_${(new Date()).toISOString().slice(0,19)}.json`; document.body.appendChild(a); a.click(); a.remove();
            URL.revokeObjectURL(url);
        }

        function limparLogsManuais() {
            if (!confirm('Clear all stored logs?')) return;
            localStorage.removeItem(LOG_KEY); document.getElementById('log-box').innerHTML = ''; log('Logs cleared manually', 'warn');
        }

        function loadVerboseSetting() { verboseLogging = localStorage.getItem(LOG_VERBOSE_KEY) === '1'; updateVerboseChip(); }
        function toggleVerbose() { verboseLogging = !verboseLogging; localStorage.setItem(LOG_VERBOSE_KEY, verboseLogging ? '1' : '0'); updateVerboseChip(); log(`Advanced F12 Logs ${verboseLogging ? 'Enabled' : 'Disabled'}`, 'info'); }
        function updateVerboseChip() { document.getElementById('chip-verbose').innerText = `Logging: ${verboseLogging ? 'ON' : 'OFF'}`; document.getElementById('btn-toggle-logs').innerText = verboseLogging ? '🔍 Logs: ON' : '🔍 Ativar Logs'; }

        // --- Intercom: Message Receiver from Popups ---
        window.addEventListener('message', function(e) {
            try {
                const data = e.data;
                if (!data || !data.type) return;
                
                if (data.type === 'kiosk_f12_capture') {
                    const meta = { source: e.origin || 'Child Tab' };
                    log(data.msg, data.level === 'error' ? 'error' : 'remote', meta);
                } 
                else if (data.type === 'kiosk_action') {
                    if (data.action === 'toggle_pause') {
                        togglePauseLocal();
                    } else if (data.action === 'jump_to') {
                        // FEATURE: Navigate directly to the clicked bar
                        log(`[MASTER] User clicked to jump to index: ${data.targetIndex}`, 'info', { channel: 'postMessage' });
                        if (timerWorker) timerWorker.postMessage('stop');
                        rotacionar(data.targetIndex);
                    }
                }
            } catch (err) {}
        });

        // BroadcastChannel Receiver (Fallback for COOP isolation)
        if (bc_master) {
            bc_master.onmessage = function(ev) {
                try {
                    const d = ev.data;
                    if (!d || !d.type) return;
                    if (d.type === 'kiosk_f12_capture') {
                        log(d.msg, d.level === 'error' ? 'error' : 'remote', { source: 'COOP Domain' });
                    } else if (d.type === 'kiosk_action') {
                        if (d.action === 'toggle_pause') togglePauseLocal();
                        else if (d.action === 'jump_to') {
                            log(`[MASTER BC] User clicked to jump to index: ${d.targetIndex}`, 'info', { channel: 'BroadcastChannel' });
                            if (timerWorker) timerWorker.postMessage('stop');
                            rotacionar(d.targetIndex);
                        }
                    }
                } catch (e) { }
            };
        }

        // Active Tab Monitor
        function countPopups() {
            let count = (janelaKiosk && !janelaKiosk.closed) ? 1 : 0;
            document.getElementById('chip-connection').innerText = `Popups: ${count}`;
        }
        setInterval(countPopups, 2000);

        // --- Timer Web Worker ---
        const workerCode = `
            let timer = null;
            self.onmessage = function(e) {
                if (e.data === 'start') { if(timer) clearInterval(timer); timer = setInterval(() => self.postMessage('tick'), 1000); } 
                else if (e.data === 'stop') { clearInterval(timer); timer = null; }
            };
        `;
        timerWorker = new Worker(URL.createObjectURL(new Blob([workerCode], { type: 'application/javascript' })));

        // --- Core Functions ---
        window.onload = function() { carregarRotas(); renderizarLista(); loadVerboseSetting(); };

        function carregarRotas() { const salvas = localStorage.getItem(ROUTES_KEY); if (salvas) rotas = JSON.parse(salvas); else { rotas = JSON.parse(JSON.stringify(rotasPadrao)); localStorage.setItem(ROUTES_KEY, JSON.stringify(rotas)); } }
        function salvarRotasManualmente() { lerListaDoDOM(); localStorage.setItem(ROUTES_KEY, JSON.stringify(rotas)); const btn = document.getElementById('btn-save'); btn.innerText = "✔ Salvo!"; btn.style.background = "#4CAF50"; setTimeout(() => { btn.innerText = "💾 Salvar Alterações"; btn.style.background = "#FF9800"; }, 2000); log("List successfully saved.", "info"); }

        function renderizarLista() {
            const container = document.getElementById('lista-rotas'); container.innerHTML = '';
            rotas.forEach((rota, index) => {
                const row = document.createElement('div'); row.className = 'route-item'; row.id = `row-${index}`; row.draggable = !running;
                row.innerHTML = `
                    <div class="drag-handle" title="Hold to drag">☰</div>
                    <input type="text" class="input-name" value="${rota.nome}" placeholder="Name" ${running ? 'disabled' : ''}>
                    <input type="text" class="input-url" value="${rota.url}" placeholder="http://..." ${running ? 'disabled' : ''}>
                    <input type="number" class="input-time" value="${rota.tempo}" min="3" placeholder="Secs" ${running ? 'disabled' : ''}>
                    <button class="delete" onclick="removerLinha(this)" ${running ? 'disabled' : ''}>🗑️</button>
                `;
                row.addEventListener('dragstart', function(e) { draggedItem = this; setTimeout(() => this.classList.add('dragging'), 0); });
                row.addEventListener('dragend', function() { this.classList.remove('dragging'); draggedItem = null; lerListaDoDOM(); });
                row.addEventListener('dragover', function(e) { e.preventDefault(); });
                row.addEventListener('dragenter', function(e) { e.preventDefault(); if (this !== draggedItem) { let allRows = Array.from(container.querySelectorAll('.route-item')); if (allRows.indexOf(draggedItem) < allRows.indexOf(this)) this.parentNode.insertBefore(draggedItem, this.nextSibling); else this.parentNode.insertBefore(draggedItem, this); } });
                container.appendChild(row);
            });
        }

        function adicionarLinha() { rotas.push({ nome: 'Novo Site', url: 'https://', tempo: 15 }); renderizarLista(); document.getElementById('lista-rotas').scrollTop = 9999; }
        function removerLinha(btn) { btn.parentElement.remove(); lerListaDoDOM(); }
        function lerListaDoDOM() { rotas = []; document.querySelectorAll('.route-item').forEach((row) => { const inputs = row.querySelectorAll('input'); rotas.push({ nome: inputs[0].value || 'Unknown', url: inputs[1].value || 'about:blank', tempo: parseInt(inputs[2].value) || 10 }); }); }

        function atualizarDestaqueVisual(index) { document.querySelectorAll('.route-item').forEach(r => r.classList.remove('active')); const rowAtual = document.getElementById(`row-${index}`); if (rowAtual) { rowAtual.classList.add('active'); rowAtual.scrollIntoView({ behavior: 'smooth', block: 'center' }); } }

        function toggleKiosk() { if (running) pararKiosk(); else iniciarKiosk(); }

        function togglePauseLocal() {
            if (!running) return;
            isPaused = !isPaused;
            const btnPause = document.getElementById('btn-pause');
            if (isPaused) { btnPause.innerText = "▶ RETOMAR"; btnPause.style.background = "#4CAF50"; log("⏸ Rotation Paused.", "warn"); } 
            else { btnPause.innerText = "⏸ PAUSAR"; btnPause.style.background = "#FF9800"; log("▶ Rotation Resumed.", "info"); }
            sincronizarComPopup();
        }

        function sincronizarComPopup() {
            const payload = { type: 'kiosk_sync', paused: isPaused, time: tempoRestante };
            if (janelaKiosk && !janelaKiosk.closed) {
                try { janelaKiosk.postMessage(payload, '*'); } catch(e) {}
            }
            if (bc_master) { try { bc_master.postMessage(payload); } catch(e) {} }
        }

        function iniciarKiosk() {
            lerListaDoDOM(); if (rotas.length === 0) { alert("Please add at least one site."); return; }
            localStorage.setItem(ROUTES_KEY, JSON.stringify(rotas)); running = true; isPaused = false; renderizarLista();

            janelaKiosk = window.open('about:blank', TARGET_NAME);
            if (!janelaKiosk || janelaKiosk.closed) { alert("⚠️ Popup blocked by browser!"); log("ERROR: Tab blocked.", "error"); pararKiosk(); return; }

            const btnStart = document.getElementById('btn-start'); btnStart.innerText = "⏹ PARAR KIOSK"; btnStart.classList.remove('start'); btnStart.classList.add('stop');
            const btnPause = document.getElementById('btn-pause'); btnPause.style.display = 'block'; btnPause.innerText = "⏸ PAUSAR"; btnPause.style.background = "#FF9800";
            document.getElementById('btn-add').disabled = true; document.getElementById('btn-save').disabled = true;

            log("🚀 Kiosk Started.", "info");
            rotacionar(0);
        }

        function pararKiosk() {
            running = false; isPaused = false;
            if (janelaKiosk && !janelaKiosk.closed) janelaKiosk.close();
            timerWorker.postMessage('stop');
            const btnStart = document.getElementById('btn-start'); btnStart.innerText = "▶ INICIAR KIOSK"; btnStart.classList.remove('stop'); btnStart.classList.add('start');
            document.getElementById('btn-pause').style.display = 'none'; document.getElementById('display-timer').innerText = "--"; document.getElementById('status-text').innerText = "Stopped."; document.getElementById('btn-add').disabled = false; document.getElementById('btn-save').disabled = false;
            document.querySelectorAll('.route-item').forEach(r => r.classList.remove('active')); renderizarLista();
            log('🛑 Kiosk Stopped manually.', 'warn');
        }

        function checarDisponibilidade(url, nome) {
            // FIX: Added performance.now() to measure load time/ping as requested
            const startPing = performance.now();
            try { 
                fetch(url, { mode: 'no-cors', cache: 'no-store' })
                .then(() => { log(`📡 Radar [${nome}]: OK! (${Math.round(performance.now() - startPing)}ms)`, "ping", { url }); })
                .catch(() => { log(`❌ Radar [${nome}]: INDISPONÍVEL. (${Math.round(performance.now() - startPing)}ms)`, "error", { url }); }); 
            } catch (e) {}
        }

        function rotacionar(index) {
            if (!running) return; if (index >= rotas.length) index = 0;
            currentActiveIndex = index;
            const rota = rotas[index]; const nextIndex = (index + 1) % rotas.length;

            document.getElementById('status-text').innerHTML = `Displaying: <b style="color:#00E676">${rota.nome}</b>`;
            log(`➡️ Navigating to: ${rota.nome}`, 'info', { idx: index });
            atualizarDestaqueVisual(index);

            // Instructions embedded in URL hash (Reliable zero-point communication)
            let instrucoesUI = `kiosk_idx=${index}&kiosk_tot=${rotas.length}&kiosk_time=${rota.tempo}`;
            let separador = rota.url.includes('#') ? '&' : '#';
            let urlFinalComInstrucoes = rota.url + separador + instrucoesUI;

            try {
                if (!janelaKiosk || janelaKiosk.closed) { janelaKiosk = window.open(urlFinalComInstrucoes, TARGET_NAME); } 
                else { janelaKiosk.location.href = urlFinalComInstrucoes; }
            } catch (e) { janelaKiosk = window.open(urlFinalComInstrucoes, TARGET_NAME); }

            checarDisponibilidade(rota.url, rota.nome);
            tempoRestante = rota.tempo; document.getElementById('display-timer').innerText = tempoRestante;
            timerWorker.postMessage('start');

            timerWorker.onmessage = function() {
                if (isPaused) { sincronizarComPopup(); return; }
                tempoRestante--; document.getElementById('display-timer').innerText = tempoRestante;
                sincronizarComPopup(); 

                if (tempoRestante === 8 && rotas.length > 1) preload(rotas[nextIndex].url);
                if (tempoRestante <= 0) { timerWorker.postMessage('stop'); rotacionar(nextIndex); }
            };
        }

        function preload(url) { document.querySelectorAll('link[rel="prerender"]').forEach(l => l.remove()); const link = document.createElement('link'); link.rel = 'prerender'; link.href = url; document.head.appendChild(link); }

        // Keep screen awake
        let wakeLock = null; async function solicitarWakeLock() { try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {} }
        document.addEventListener('visibilitychange', async () => { if (wakeLock !== null && document.visibilityState === 'visible') solicitarWakeLock(); }); solicitarWakeLock();

        // Auto-clear logs older than 7 days
        (function cleanOldLogs() {
            try {
                const arr = loadLogsFromStorage(); const cutoff = Date.now() - (1000 * 60 * 60 * 24 * 7);
                persistLogs(arr.filter(e => new Date(e.time).getTime() > cutoff));
            } catch(e){}
        })();
    </script>
</body>
</html>
